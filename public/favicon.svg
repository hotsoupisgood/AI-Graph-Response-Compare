  <!-- Evil red dot eyes -->
  <circle cx="10" cy="12" r="2" fill="#dc2626"/>
  <circle cx="22" cy="12" r="2" fill="#dc2626"/>

  <!-- Bar chart in front -->
  <rect x="4" y="18" width="6" height="10" fill="#ef4444"/>
  <rect x="13" y="14" width="6" height="14" fill="#9ca3af"/>
  <rect x="22" y="20" width="6" height="8" fill="#22c55e"/>

  <!-- Baseline -->
  <rect x="2" y="28" width="28" height="2" fill="#374151"/>
</svg>
